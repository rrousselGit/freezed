name: freezed_example
description: A new Flutter project.
publish_to: none

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  freezed_annotation:
    path: ../../freezed_annotation
  json_annotation: ^4.9.0

dev_dependencies:
  freezed:
    path: ../
  json_serializable: ^6.9.4
  build_runner:
  flutter_test:
    sdk: flutter
  # To support "downgrade" checks due to a transitive dependency not handling it correctly
  file: ">=7.0.0"

dependency_overrides:
  freezed:
    path: ../
  freezed_annotation:
    path: ../../freezed_annotation
